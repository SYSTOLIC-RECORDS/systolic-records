<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systolic Records</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
    }

    /* VIDEO */
    .hero__video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
    }

    /* OVERLAY sutil */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
      z-index: 1;
    }

    /* CONTENIDO */
    .hero__content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 3.5vh 2rem 3vh;
    }

    /* TEXTO SUPERIOR */
    .hero__tagline {
      font-family: 'Cinzel', 'Times New Roman', serif;
      font-size: clamp(0.65rem, 1.3vw, 0.95rem);
      font-weight: 400;
      letter-spacing: 0.35em;
      color: #ffffff;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.3s;
    }

    /* ESPACIO LOGO */
    .hero__logo-space {
      flex: 1;
    }

    /* SUBTEXTO ROJO */
    .hero__sub {
      font-family: 'Cinzel', 'Helvetica Neue', sans-serif;
      font-size: clamp(0.4rem, 0.75vw, 0.58rem);
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #e8000d;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2.5vh;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 0.8s;
    }

    /* BOTONES */
    .hero__buttons {
      display: flex;
      gap: clamp(1.5rem, 4vw, 3rem);
      align-items: center;
      margin-bottom: 0.5vh;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards 1.1s;
    }

    .hero__btn {
      width: clamp(48px, 5vw, 64px);
      height: clamp(48px, 5vw, 64px);
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: box-shadow 0.3s ease, transform 0.25s ease;
    }

    .hero__btn:hover {
      box-shadow: 0 0 18px #e8000d, 0 0 38px rgba(232, 0, 13, 0.35);
      transform: scale(1.1);
    }

    .hero__btn svg {
      width: clamp(22px, 2.5vw, 30px);
      height: clamp(22px, 2.5vw, 30px);
      fill: #000000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .hero__sub {
        font-size: clamp(0.35rem, 2.2vw, 0.5rem);
        letter-spacing: 0.12em;
      }
      .hero__buttons {
        gap: 1.5rem;
      }
    }

    @supports (-webkit-touch-callout: none) {
      .hero__video { height: 100dvh; }
      .hero        { height: 100dvh; }
    }
  </style>
</head>
<body>

<section class="hero">

  <!-- VÍDEO -->
  <video class="hero__video" autoplay loop muted playsinline>
    <source src="videos/systolic-hero.mp4" type="video/mp4" />
  </video>

  <!-- OVERLAY -->
  <div class="hero__overlay"></div>

  <!-- CONTENIDO -->
  <div class="hero__content">

    <!-- Texto superior -->
    <p class="hero__tagline">Made by Artists for Artists</p>

    <!-- Espacio donde vive el logo animado -->
    <div class="hero__logo-space"></div>

    <!-- Subtexto rojo -->
    <p class="hero__sub">
      Hard Techno / Schranz Underground&nbsp;&nbsp;—&nbsp;&nbsp;Best Label in Spain&nbsp;&nbsp;—&nbsp;&nbsp;Top 10 Worldwide
    </p>

    <!-- Botones plataformas -->
    <div class="hero__buttons">

      <!-- Beatport -->
      <a href="https://www.beatport.com/label/systolic-records/105923"
         target="_blank" rel="noopener noreferrer"
         class="hero__btn" aria-label="Beatport">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

        </svg>
      </a>

      <!-- SoundCloud -->
      <a href="https://soundcloud.com/systolicrecords"
         target="_blank" rel="noopener noreferrer"
         class="hero__btn" aria-label="SoundCloud">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M1.175 12.225c-.026 0-.049.008-.07.021l-.648.393a.144.144 0 0 0-.065.054.145.145 0 0 0-.024.08v3.39c0 .054.019.1.057.137.038.038.084.057.137.057h.62c.054 0 .1-.019.137-.057.038-.037.057-.083.057-.137v-3.39a.145.145 0 0 0-.057-.137.145.145 0 0 0-.144-.011zm2.07-.78c-.054 0-.1.019-.137.057a.187.187 0 0 0-.057.137v4.76c0 .054.019.1.057.137.038.038.083.057.137.057h.62c.054 0 .1-.019.137-.057a.187.187 0 0 0 .057-.137v-4.76a.187.187 0 0 0-.057-.137.187.187 0 0 0-.137-.057zm2.07-.84c-.054 0-.1.019-.137.057a.187.187 0 0 0-.057.137v5.6c0 .054.019.1.057.137.037.038.083.057.137.057h.62c.054 0 .1-.019.137-.057a.187.187 0 0 0 .057-.137v-5.6a.187.187 0 0 0-.057-.137.187.187 0 0 0-.137-.057zm2.07 1.26c-.054 0-.1.019-.137.057a.187.187 0 0 0-.057.137v4.34c0 .054.019.1.057.137.037.038.083.057.137.057h.62c.054 0 .1-.019.137-.057a.187.187 0 0 0 .057-.137v-4.34a.187.187 0 0 0-.057-.137.187.187 0 0 0-.137-.057zm2.07-2.1c-.054 0-.1.019-.137.057a.187.187 0 0 0-.057.137v6.44c0 .054.019.1.057.137.037.038.083.057.137.057h.62c.054 0 .1-.019.137-.057a.187.187 0 0 0 .057-.137v-6.44a.187.187 0 0 0-.057-.137.187.187 0 0 0-.137-.057zm4.35.21c-.897 0-1.72.317-2.36.84-.189-2.744-2.457-4.92-5.24-4.92-1.464 0-2.793.573-3.773 1.506v8.834H19.5a2.5 2.5 0 0 0 0-5 2.49 2.49 0 0 0-.665.091A4.5 4.5 0 0 0 14.755 9.975z"/>
        </svg>
      </a>

      <!-- Bandcamp -->
      <a href="https://systolicrecords.bandcamp.com"
         target="_blank" rel="noopener noreferrer"
         class="hero__btn" aria-label="Bandcamp">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/>
        </svg>
      </a>

    </div>
  </div>
</section>

</body>
</html>
