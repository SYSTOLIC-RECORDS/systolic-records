<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systolic Records</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    .hero { position: relative; width: 100%; height: 100vh; overflow: hidden; }
    .hero__video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; }
    @supports (-webkit-touch-callout: none) {
      .hero { height: 100dvh; }
      .hero__video { height: 100dvh; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <video class="hero__video" autoplay loop muted playsinline>
      <source src="videos/systolic-hero.mp4" type="video/mp4" />
    </video>
  </section>
</body>
</html>
